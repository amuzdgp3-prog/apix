services:
  # ---- PWA Build (one-shot) ----
  client-build:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: apix-client-builder
    volumes:
      - client_dist:/output
    command:
      - sh
      - -c
      - "cp -r /dist/* /output/ && chmod -R 755 /output/ && echo 'Client built OK'"

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: apix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apix
      POSTGRES_PASSWORD: apix_password
      POSTGRES_DB: apix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: apix-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ---- Fastify Server ----
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: apix-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://apix:apix_password@postgres:5432/apix
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      SERVER_HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3001/api/monitoring/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }); setTimeout(() => process.exit(1), 5000)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Nginx (reverse proxy + static) ----
  nginx:
    image: nginx:alpine
    container_name: apix-nginx
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
      minio:
        condition: service_healthy
      client-build:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - client_dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  minio_data:
  client_dist: